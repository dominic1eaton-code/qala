version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: qala-postgres
    environment:
      POSTGRES_USER: qala
      POSTGRES_PASSWORD: qala
      POSTGRES_DB: qala
    ports:
      - "5432:5432"
    volumes:
      - qala-pgdata:/var/lib/postgresql/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.10
    container_name: qala-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - qala-redpanda:/var/lib/redpanda/data

volumes:
  qala-pgdata:
  qala-redpanda:
